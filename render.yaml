services:
  - type: web
    name: liuyaocan
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LLM_BASE_URL
        value: https://wgooold.cn
      - key: LLM_MODEL
        value: Qwen3.6-27B
      - key: LLM_API_KEY
        sync: false
